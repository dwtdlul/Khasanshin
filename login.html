<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mobile-container">
    <div class="header-logo">
        <img src="./images/students_corner.png" alt="Логотип">
    </div>

    <div class="flex-fill" style="flex-grow: 0;">
        <h2 style="text-align: center; margin-top: 10px;">Авторизация</h2>
    </div>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" id="loginUser" placeholder="Введите логин">
            <!-- Предупреждение выводится строго под полем логина -->
            <span class="error-msg" id="loginError"></span>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="loginPass" placeholder="Введите пароль">
        </div>
        <button type="submit" class="btn-primary">Войти</button>
        <div class="auth-link">Еще не зарегистрированы? <a href="index.html">Регистрация</a></div>
    </form>

    <div class="flex-fill" style="flex-grow: 1; display: flex; align-items: flex-end; padding-bottom: 20px;">
        <div class="welcome-placeholder" style="width: 100%; margin-top: 25px;">
            <h3>Добро пожаловать!</h3>
            <p>Войдите в систему, чтобы получить доступ к курсам повышения квалификации.</p>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const login = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        const errorSpan = document.getElementById('loginError');
        const users = JSON.parse(localStorage.getItem('eduUsers')) || [];

        // Проверка на администратора
        if(login === 'Admin26' && pass === 'Demo20') {
            localStorage.setItem('eduCurrentUser', JSON.stringify({ login: 'Admin26', role: 'admin' }));
            window.location.href = 'admin.html';
            return;
        }

        const user = users.find(u => u.login === login && u.password === pass);
        if(user) {
            localStorage.setItem('eduCurrentUser', JSON.stringify(user));
            window.location.href = 'cabinet.html';
        } else {
            // Вывод предупреждения, если логин или пароль неверны
            errorSpan.innerText = 'Неправильный логин или пароль';
        }
    });
</script>
</body>
</html>
