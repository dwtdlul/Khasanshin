<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Регистрация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mobile-container">
    <div class="header-logo">
        <img src="./images/students_corner.png" alt="Логотип">
    </div>

    <div class="slider-container">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="slide"><img src="./images/diploma.webp" alt="Охрана труда"></div>
            <div class="slide"><img src="./images/6410690722451365045.jpg" alt="Педагогика"></div>
            <div class="slide"><img src="./images/course_1.jpg" alt="Рабочие профессии"></div>
            <div class="slide"><img src="./images/88-gHQq11R0.jpg" alt="Электробезопасность"></div>
        </div>
        <button class="slider-btn prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="slider-btn next" onclick="moveSlide(1)">&#10095;</button>
    </div>

    <h2>Регистрация</h2>
    <form id="registerForm">
        <div class="form-group">
            <label>Логин (лат. и цифры, min 6)</label>
            <input type="text" id="regLogin" placeholder="Введите логин">
            <span class="error-msg" id="regLoginError"></span>
        </div>
        <div class="form-group">
            <label>Пароль (min 8 символов)</label>
            <input type="password" id="regPass" placeholder="Введите пароль">
            <span class="error-msg" id="regPassError"></span>
        </div>
        <div class="form-group">
            <label>ФИО</label>
            <input type="text" id="regFio" placeholder="Иванов И.И.">
        </div>
        <div class="form-group">
            <label>Телефон</label>
            <input type="tel" id="regPhone" placeholder="+7 (999) 000-00-00">
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="regEmail" placeholder="example@mail.ru">
        </div>
        <button type="submit" class="btn-primary">Зарегистрироваться</button>
        <div class="auth-link">Есть аккаунт? <a href="login.html">Войти</a></div>
    </form>
</div>

<div id="notificationModal" class="modal">
    <div class="modal-content">
        <p id="modalText">Уведомление</p>
        <button class="btn-primary" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
    let slideIndex = 0;
    function showSlide(index) {
        const wrapper = document.getElementById('sliderWrapper');
        const slides = document.querySelectorAll('.slide');
        if(index >= slides.length) index = 0;
        if(index < 0) index = slides.length - 1;
        slideIndex = index;
        wrapper.style.transform = `translateX(-${index * 100}%)`;
    }
    function moveSlide(n) { showSlide(slideIndex + n); }
    setInterval(() => { moveSlide(1); }, 3000);

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let users = JSON.parse(localStorage.getItem('eduUsers')) || [];
        const login = document.getElementById('regLogin').value.trim();
        const pass = document.getElementById('regPass').value.trim();
        const fio = document.getElementById('regFio').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        
        let isValid = true;
        const loginRegex = /^[a-zA-Z0-9]{6,}$/;
        
        if(!loginRegex.test(login)) {
            document.getElementById('regLoginError').innerText = 'Логин: минимум 6 лат. букв и цифр';
            isValid = false;
        } else if(users.find(u => u.login === login)) {
            document.getElementById('regLoginError').innerText = 'Логин уже занят';
            isValid = false;
        } else {
            document.getElementById('regLoginError').innerText = '';
        }

        if(pass.length < 8) {
            document.getElementById('regPassError').innerText = 'Пароль должен быть 8+ символов';
            isValid = false;
        } else {
            document.getElementById('regPassError').innerText = '';
        }

        if(isValid) {
            users.push({ login, password: pass, fio, phone, email, role: 'user' });
            localStorage.setItem('eduUsers', JSON.stringify(users));
            alert('Регистрация успешна! Перейдите к входу.');
            window.location.href = 'login.html';
        }
    });

    function closeModal() { document.getElementById('notificationModal').style.display = 'none'; }
</script>
</body>
</html>
