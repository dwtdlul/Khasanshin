<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая заявка</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mobile-container">
    <div class="header-logo">
        <img src="./images/students_corner.png" alt="Логотип">
    </div>

    <div class="cabinet-header">
        <h2>Оформление заявки</h2>
        <button class="btn-outline small" onclick="window.location.href='cabinet.html'">Назад</button>
    </div>
    
    <form id="requestForm" style="margin-top: 20px;">
        <div class="form-group">
            <label>Выберите курс</label>
            <select id="reqCourse">
                <option value="Охрана труда">Охрана труда</option>
                <option value="Педагогика">Педагогика</option>
                <option value="Рабочие профессии">Рабочие профессии</option>
                <option value="Электробезопасность">Электробезопасность</option>
            </select>
        </div>
        <div class="form-group">
            <label>Дата начала (ДД.ММ.ГГГГ)</label>
            <input type="text" id="reqDate" placeholder="ДД.ММ.ГГГГ" maxlength="10">
        </div>
        <div class="form-group">
            <label>Способ оплаты</label>
            <select id="reqPayment">
                <option value="Банковская карта">Банковская карта</option>
                <option value="Наличный расчет">Наличный расчет</option>
                <option value="QR-код">QR-код</option>
            </select>
        </div>
        <button type="submit" class="btn-primary">Отправить заявку</button>
    </form>
</div>

<script>
    document.getElementById('requestForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const currentUser = JSON.parse(localStorage.getItem('eduCurrentUser'));
        if(!currentUser) { alert("Сначала войдите в систему!"); window.location.href='login.html'; return; }

        let requests = JSON.parse(localStorage.getItem('eduRequests')) || [];
        const course = document.getElementById('reqCourse').value;
        const date = document.getElementById('reqDate').value;
        const payment = document.getElementById('reqPayment').value;

        const dateRegex = /^(\d{2})\.(\d{2})\.(\d{4})$/;
        if(!dateRegex.test(date)) {
            alert('Введите дату в формате ДД.ММ.ГГГГ');
            return;
        }

        const newRequest = {
            id: Date.now(),
            userLogin: currentUser.login,
            userFio: currentUser.fio,
            course: course,
            date: date,
            payment: payment,
            status: 'Новая',
            review: null
        };

        requests.push(newRequest);
        localStorage.setItem('eduRequests', JSON.stringify(requests));
        alert('Заявка успешно отправлена администратору!');
        window.location.href = 'cabinet.html';
    });
</script>
</body>
</html>
